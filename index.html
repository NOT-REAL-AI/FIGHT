<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🥛 МОЛОЧНАЯ БИТВА · БОСС-ФАЙТ</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a0a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      font-family: 'Courier New', monospace;
      position: relative;
      overflow: hidden;
    }

    /* Аура эффекты */
    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 30% 40%, rgba(255, 100, 200, 0.15) 0%, transparent 60%);
      filter: blur(80px);
      animation: auraPulse 8s infinite alternate;
    }

    body::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 70% 60%, rgba(100, 200, 255, 0.15) 0%, transparent 60%);
      filter: blur(80px);
      animation: auraPulse 10s infinite alternate-reverse;
    }

    @keyframes auraPulse {
      0% { opacity: 0.5; transform: scale(1); }
      100% { opacity: 1; transform: scale(1.2); }
    }

    .game-container {
      position: relative;
      z-index: 10;
      width: 1000px;
      max-width: 100%;
      background: rgba(10, 5, 20, 0.7);
      backdrop-filter: blur(15px);
      border-radius: 40px;
      padding: 25px;
      border: 2px solid rgba(255, 200, 255, 0.3);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 50px rgba(200, 100, 255, 0.3);
    }

    .game-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding: 0 10px;
    }

    .health-bar {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .health-label {
      color: #ffccdd;
      font-size: 1.2rem;
      font-weight: bold;
      text-shadow: 0 0 10px #ff69b4;
    }

    .health-fill {
      width: 200px;
      height: 25px;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 30px;
      overflow: hidden;
      border: 2px solid #ff99cc;
    }

    .health-fill span {
      display: block;
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, #ff3366, #ff6699, #ff99cc);
      transition: width 0.2s;
      box-shadow: 0 0 15px #ff3366;
    }

    .boss-health .health-fill span {
      background: linear-gradient(90deg, #9933ff, #cc66ff, #ee99ff);
    }

    .score {
      color: #ffd700;
      font-size: 1.5rem;
      font-weight: bold;
      text-shadow: 0 0 20px #ffd700;
    }

    canvas {
      display: block;
      width: 100%;
      aspect-ratio: 16/9;
      background: linear-gradient(180deg, #1a1a3e 0%, #2d1b4e 50%, #1a0a2e 100%);
      border-radius: 30px;
      border: 3px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), inset 0 0 50px rgba(100, 0, 200, 0.2);
      cursor: none;
    }

    .controls {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
      color: #ccbbff;
      font-size: 1rem;
      padding: 0 10px;
    }

    .controls span {
      background: rgba(50, 20, 70, 0.6);
      padding: 8px 20px;
      border-radius: 40px;
      border: 1px solid #9966ff;
      backdrop-filter: blur(5px);
    }

    .game-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 100;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(10px);
    }

    .game-over-card {
      background: linear-gradient(135deg, #2a1a4e, #1a0a3e);
      padding: 40px 60px;
      border-radius: 60px;
      text-align: center;
      border: 3px solid #cc66ff;
      box-shadow: 0 0 80px #9933ff;
    }

    .game-over-card h2 {
      color: #ffccff;
      font-size: 3rem;
      margin-bottom: 20px;
      text-shadow: 0 0 30px #ff66cc;
    }

    .game-over-card p {
      color: #ffd700;
      font-size: 1.8rem;
      margin-bottom: 30px;
    }

    .restart-btn {
      background: linear-gradient(135deg, #ff6699, #cc33ff);
      border: none;
      padding: 20px 50px;
      font-size: 1.5rem;
      font-weight: bold;
      color: white;
      border-radius: 50px;
      cursor: pointer;
      border: 2px solid #ffccff;
      box-shadow: 0 10px 0 #660099, 0 0 30px #ff66cc;
      transition: 0.1s;
      text-transform: uppercase;
    }

    .restart-btn:active {
      transform: translateY(7px);
      box-shadow: 0 3px 0 #660099, 0 0 40px #ff66cc;
    }

    .start-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 50;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(8px);
    }

    .start-btn {
      background: linear-gradient(135deg, #66ccff, #9966ff);
      border: none;
      padding: 25px 70px;
      font-size: 2rem;
      font-weight: bold;
      color: white;
      border-radius: 60px;
      cursor: pointer;
      border: 3px solid #ccddff;
      box-shadow: 0 15px 0 #336699, 0 0 50px #66aaff;
      transition: 0.1s;
      text-transform: uppercase;
      letter-spacing: 5px;
    }

    .start-btn:active {
      transform: translateY(10px);
      box-shadow: 0 5px 0 #336699, 0 0 60px #66aaff;
    }
  </style>
</head>
<body>
<div class="game-container">
  <div class="game-header">
    <div class="health-bar">
      <span class="health-label">🥛 МАЛЬЧИК</span>
      <div class="health-fill">
        <span id="playerHealthBar" style="width: 100%"></span>
      </div>
    </div>
    <div class="score">
      <span id="scoreDisplay">000</span>
    </div>
    <div class="health-bar boss-health">
      <span class="health-label">👾 БОСС</span>
      <div class="health-fill">
        <span id="bossHealthBar" style="width: 100%"></span>
      </div>
    </div>
  </div>

  <canvas id="gameCanvas" width="960" height="540"></canvas>

  <div class="controls">
    <span>←↓↑→ / WASD — ДВИЖЕНИЕ</span>
    <span>🖱️ ЛКМ / ПРОБЕЛ — СТРЕЛЬБА МОЛОКОМ</span>
    <span>💩 УВОРАЧИВАЙСЯ ОТ КАКАШЕК!</span>
  </div>
</div>

<div class="start-screen" id="startScreen">
  <button class="start-btn" id="startBtn">🥛 СТАРТ 🥛</button>
</div>

<div class="game-overlay" id="gameOverlay">
  <div class="game-over-card">
    <h2 id="gameOverTitle">ИГРА ОКОНЧЕНА</h2>
    <p id="gameOverMessage">СЧЁТ: 000</p>
    <button class="restart-btn" id="restartBtn">ИГРАТЬ СНОВА</button>
  </div>
</div>

<script>
  (function() {
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const startScreen = document.getElementById('startScreen');
    const gameOverlay = document.getElementById('gameOverlay');
    const startBtn = document.getElementById('startBtn');
    const restartBtn = document.getElementById('restartBtn');
    const playerHealthBar = document.getElementById('playerHealthBar');
    const bossHealthBar = document.getElementById('bossHealthBar');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const gameOverTitle = document.getElementById('gameOverTitle');
    const gameOverMessage = document.getElementById('gameOverMessage');

    // Размеры
    const W = 960, H = 540;
    
    // Игровые объекты
    let player = { x: 150, y: H/2, radius: 18, health: 100, maxHealth: 100 };
    let boss = { x: W - 150, y: H/2, radius: 30, health: 100, maxHealth: 100 };
    
    // Снаряды
    let milkBullets = [];
    let poopAttacks = [];
    
    // Параметры
    let score = 0;
    let gameActive = false;
    let gameLoopId = null;
    let bossMoveTimer = 0;
    let bossTargetX = boss.x, bossTargetY = boss.y;
    let bossShootTimer = 0;
    let frameCount = 0;
    
    // Управление
    const keys = {
      ArrowLeft: false, ArrowRight: false, ArrowUp: false, ArrowDown: false,
      KeyA: false, KeyD: false, KeyW: false, KeyS: false,
      Space: false
    };
    
    let mousePressed = false;
    let mouseX = 0, mouseY = 0;
    
    // Скорости
    const PLAYER_SPEED = 4.5;
    const BULLET_SPEED = 7;
    const POOP_SPEED = 4.5;
    const BOSS_SPEED = 1.2;

    // --- ИНИЦИАЛИЗАЦИЯ ---
    function resetGame() {
      player = { x: 120, y: H/2, radius: 18, health: 100, maxHealth: 100 };
      boss = { x: W - 120, y: H/2, radius: 32, health: 100, maxHealth: 100 };
      milkBullets = [];
      poopAttacks = [];
      score = 0;
      bossMoveTimer = 0;
      bossShootTimer = 0;
      frameCount = 0;
      bossTargetX = boss.x;
      bossTargetY = boss.y;
      updateUI();
    }

    function updateUI() {
      playerHealthBar.style.width = Math.max(0, (player.health / player.maxHealth) * 100) + '%';
      bossHealthBar.style.width = Math.max(0, (boss.health / boss.maxHealth) * 100) + '%';
      scoreDisplay.textContent = String(score).padStart(3, '0');
    }

    // --- ВВОД ---
    function handleKeyDown(e) {
      if (!gameActive) return;
      if (e.code in keys) {
        keys[e.code] = true;
        e.preventDefault();
      }
      if (e.code === 'Space') {
        keys.Space = true;
        e.preventDefault();
        shootMilk();
      }
    }

    function handleKeyUp(e) {
      if (e.code in keys) {
        keys[e.code] = false;
        e.preventDefault();
      }
      if (e.code === 'Space') {
        keys.Space = false;
        e.preventDefault();
      }
    }

    function handleMouseMove(e) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      mouseX = (e.clientX - rect.left) * scaleX;
      mouseY = (e.clientY - rect.top) * scaleY;
    }

    function handleMouseDown(e) {
      if (!gameActive) return;
      if (e.button === 0) {
        mousePressed = true;
        shootMilk();
        e.preventDefault();
      }
    }

    function handleMouseUp(e) {
      if (e.button === 0) {
        mousePressed = false;
      }
    }

    function shootMilk() {
      if (!gameActive) return;
      if (player.health <= 0) return;
      
      // Направление к мыши или вправо по умолчанию
      let targetX = mouseX || player.x + 100;
      let targetY = mouseY || player.y;
      
      let dx = targetX - player.x;
      let dy = targetY - player.y;
      let len = Math.sqrt(dx*dx + dy*dy);
      if (len < 0.001) {
        dx = 1; dy = 0;
      } else {
        dx /= len; dy /= len;
      }
      
      milkBullets.push({
        x: player.x + dx * 20,
        y: player.y + dy * 10,
        vx: dx * BULLET_SPEED,
        vy: dy * BULLET_SPEED,
        radius: 8,
        life: 120
      });
    }

    // --- БОСС: СЛУЧАЙНОЕ НЕРАВНОМЕРНОЕ ДВИЖЕНИЕ (синусоидальное) ---
    function updateBossAI() {
      if (!gameActive) return;
      if (boss.health <= 0) return;
      
      bossMoveTimer++;
      
      // Каждые 40 кадров меняем цель с синусоидальным смещением
      if (bossMoveTimer % 40 === 0) {
        // Базовая цель — двигаться к игроку, но с большим случайным смещением
        let angleToPlayer = Math.atan2(player.y - boss.y, player.x - boss.x);
        let distToPlayer = Math.hypot(player.x - boss.x, player.y - boss.y);
        
        // Добавляем синусоидальную неравномерность
        let waveX = Math.sin(frameCount * 0.05) * 120 + Math.cos(frameCount * 0.03) * 80;
        let waveY = Math.cos(frameCount * 0.04) * 100 + Math.sin(frameCount * 0.06) * 90;
        
        // Случайное смещение
        let randomOffset = 70;
        bossTargetX = player.x + waveX + (Math.random() - 0.5) * randomOffset;
        bossTargetY = player.y + waveY + (Math.random() - 0.5) * randomOffset;
        
        // Ограничиваем арену
        bossTargetX = Math.max(400, Math.min(W - 50, bossTargetX));
        bossTargetY = Math.max(60, Math.min(H - 60, bossTargetY));
      }
      
      // Плавное движение к цели
      let dx = bossTargetX - boss.x;
      let dy = bossTargetY - boss.y;
      let dist = Math.hypot(dx, dy);
      if (dist > 2) {
        boss.x += (dx / dist) * BOSS_SPEED * (0.8 + 0.4 * Math.sin(frameCount * 0.1));
        boss.y += (dy / dist) * BOSS_SPEED * (0.8 + 0.4 * Math.cos(frameCount * 0.07));
      }
      
      // Стрельба какашками (3-5 штук залпом)
      bossShootTimer++;
      if (bossShootTimer > 35 && boss.health > 0) {
        let bulletCount = 3 + Math.floor(Math.random() * 3);
        for (let i = 0; i < bulletCount; i++) {
          let angle = Math.atan2(player.y - boss.y, player.x - boss.x);
          angle += (i - (bulletCount-1)/2) * 0.3 + (Math.random() - 0.5) * 0.4;
          
          let speedVariation = POOP_SPEED * (0.8 + Math.random() * 0.7);
          poopAttacks.push({
            x: boss.x,
            y: boss.y,
            vx: Math.cos(angle) * speedVariation,
            vy: Math.sin(angle) * speedVariation,
            radius: 10,
            life: 150
          });
        }
        bossShootTimer = 0;
      }
    }

    // --- ОБНОВЛЕНИЕ ИГРОКА ---
    function updatePlayer() {
      if (!gameActive) return;
      if (player.health <= 0) {
        gameOver(false);
        return;
      }
      
      let moveX = 0, moveY = 0;
      if (keys.ArrowLeft || keys.KeyA) moveX -= 1;
      if (keys.ArrowRight || keys.KeyD) moveX += 1;
      if (keys.ArrowUp || keys.KeyW) moveY -= 1;
      if (keys.ArrowDown || keys.KeyS) moveY += 1;
      
      if (moveX !== 0 || moveY !== 0) {
        let len = Math.sqrt(moveX*moveX + moveY*moveY);
        moveX /= len;
        moveY /= len;
        player.x += moveX * PLAYER_SPEED;
        player.y += moveY * PLAYER_SPEED;
      }
      
      // Границы
      player.x = Math.max(40, Math.min(350, player.x));
      player.y = Math.max(40, Math.min(H - 40, player.y));
      
      // Авто-стрельба если зажат пробел или мышь
      if ((keys.Space || mousePressed) && frameCount % 8 === 0) {
        shootMilk();
      }
    }

    // --- ОБНОВЛЕНИЕ СНАРЯДОВ ---
    function updateProjectiles() {
      // Молоко
      for (let i = milkBullets.length - 1; i >= 0; i--) {
        let b = milkBullets[i];
        b.x += b.vx;
        b.y += b.vy;
        b.life--;
        
        // Попадание в босса
        if (boss.health > 0) {
          let dist = Math.hypot(b.x - boss.x, b.y - boss.y);
          if (dist < boss.radius + b.radius) {
            boss.health = Math.max(0, boss.health - 8);
            score += 10;
            updateUI();
            milkBullets.splice(i, 1);
            if (boss.health <= 0) {
              gameOver(true);
            }
            continue;
          }
        }
        
        // Удаление по времени или за экраном
        if (b.life <= 0 || b.x < -50 || b.x > W+50 || b.y < -50 || b.y > H+50) {
          milkBullets.splice(i, 1);
        }
      }
      
      // Какашки
      for (let i = poopAttacks.length - 1; i >= 0; i--) {
        let p = poopAttacks[i];
        p.x += p.vx;
        p.y += p.vy;
        p.life--;
        
        // Попадание в игрока
        if (player.health > 0) {
          let dist = Math.hypot(p.x - player.x, p.y - player.y);
          if (dist < player.radius + p.radius) {
            player.health = Math.max(0, player.health - 12);
            updateUI();
            poopAttacks.splice(i, 1);
            if (player.health <= 0) {
              gameOver(false);
            }
            continue;
          }
        }
        
        if (p.life <= 0 || p.x < -50 || p.x > W+50 || p.y < -50 || p.y > H+50) {
          poopAttacks.splice(i, 1);
        }
      }
    }

    // --- ОТРИСОВКА (СИЛУЭТЫ, ПИКСЕЛЬНЫЙ СТИЛЬ) ---
    function draw() {
      ctx.clearRect(0, 0, W, H);
      
      // Фон с сеткой
      ctx.strokeStyle = '#3a2a5e';
      ctx.lineWidth = 1;
      for (let i = 0; i < W; i += 40) {
        ctx.beginPath();
        ctx.moveTo(i, 0);
        ctx.lineTo(i, H);
        ctx.strokeStyle = '#2a1a4e';
        ctx.stroke();
      }
      for (let i = 0; i < H; i += 40) {
        ctx.beginPath();
        ctx.moveTo(0, i);
        ctx.lineTo(W, i);
        ctx.strokeStyle = '#2a1a4e';
        ctx.stroke();
      }
      
      // Силуэт БОССА (злой)
      ctx.shadowColor = '#ff00ff';
      ctx.shadowBlur = 25;
      ctx.fillStyle = '#4a004a';
      ctx.beginPath();
      ctx.arc(boss.x, boss.y, boss.radius, 0, Math.PI * 2);
      ctx.fill();
      // Рога
      ctx.fillStyle = '#3a003a';
      ctx.beginPath();
      ctx.arc(boss.x - 15, boss.y - 25, 10, 0, Math.PI*2);
      ctx.arc(boss.x + 15, boss.y - 25, 10, 0, Math.PI*2);
      ctx.fill();
      // Глаза (светящиеся)
      ctx.shadowBlur = 30;
      ctx.fillStyle = '#ff0000';
      ctx.beginPath();
      ctx.arc(boss.x - 10, boss.y - 5, 7, 0, Math.PI*2);
      ctx.arc(boss.x + 10, boss.y - 5, 7, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#ffffff';
      ctx.shadowBlur = 40;
      ctx.beginPath();
      ctx.arc(boss.x - 12, boss.y - 8, 3, 0, Math.PI*2);
      ctx.arc(boss.x + 8, boss.y - 8, 3, 0, Math.PI*2);
      ctx.fill();
      
      // Силуэт ИГРОКА (мальчик)
      ctx.shadowColor = '#00ccff';
      ctx.shadowBlur = 25;
      ctx.fillStyle = '#1a5c9e';
      ctx.beginPath();
      ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
      ctx.fill();
      // Волосы
      ctx.fillStyle = '#0d3b6e';
      ctx.beginPath();
      ctx.arc(player.x - 5, player.y - 18, 8, 0, Math.PI*2);
      ctx.arc(player.x + 5, player.y - 18, 8, 0, Math.PI*2);
      ctx.fill();
      // Глаза
      ctx.fillStyle = '#aaddff';
      ctx.beginPath();
      ctx.arc(player.x - 7, player.y - 4, 5, 0, Math.PI*2);
      ctx.arc(player.x + 7, player.y - 4, 5, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(player.x - 7, player.y - 6, 2.5, 0, Math.PI*2);
      ctx.arc(player.x + 7, player.y - 6, 2.5, 0, Math.PI*2);
      ctx.fill();
      
      ctx.shadowBlur = 0;
      ctx.shadowColor = 'transparent';
      
      // МОЛОКО (овалы с верёвочкой)
      for (let b of milkBullets) {
        // Верёвочка
        ctx.beginPath();
        ctx.moveTo(b.x - b.vx*2, b.y - b.vy*2);
        ctx.lineTo(b.x, b.y);
        ctx.strokeStyle = '#d4b896';
        ctx.lineWidth = 3;
        ctx.stroke();
        // Овал молока
        ctx.shadowColor = '#ffffff';
        ctx.shadowBlur = 20;
        ctx.fillStyle = '#f0f8ff';
        ctx.beginPath();
        ctx.ellipse(b.x, b.y, 12, 7, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#e6f0fa';
        ctx.beginPath();
        ctx.ellipse(b.x-2, b.y-2, 6, 4, 0, 0, Math.PI*2);
        ctx.fill();
      }
      
      // КАКАШКИ
      for (let p of poopAttacks) {
        ctx.shadowColor = '#8B4513';
        ctx.shadowBlur = 20;
        ctx.fillStyle = '#6b3a1f';
        ctx.beginPath();
        ctx.ellipse(p.x, p.y, 12, 9, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#5a2d15';
        ctx.beginPath();
        ctx.ellipse(p.x-3, p.y-3, 6, 5, 0, 0, Math.PI*2);
        ctx.fill();
        // Завитки
        ctx.strokeStyle = '#4a2010';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(p.x+3, p.y-4, 4, 0, Math.PI);
        ctx.stroke();
      }
      ctx.shadowBlur = 0;
    }

    // --- ИГРОВОЙ ЦИКЛ ---
    function gameTick() {
      if (!gameActive) return;
      
      frameCount++;
      updatePlayer();
      updateBossAI();
      updateProjectiles();
      
      if (boss.health <= 0) {
        gameOver(true);
        return;
      }
      if (player.health <= 0) {
        gameOver(false);
        return;
      }
      
      draw();
      gameLoopId = requestAnimationFrame(gameTick);
    }

    function gameOver(won) {
      gameActive = false;
      if (gameLoopId) {
        cancelAnimationFrame(gameLoopId);
      }
      
      if (won) {
        gameOverTitle.textContent = '🏆 ПОБЕДА! 🏆';
        gameOverMessage.textContent = `БОСС ПОВЕРЖЕН! СЧЁТ: ${score}`;
      } else {
        gameOverTitle.textContent = '💀 ПОРАЖЕНИЕ 💀';
        gameOverMessage.textContent = `ТЕБЯ ЗАБРОСАЛИ... СЧЁТ: ${score}`;
      }
      
      gameOverlay.style.display = 'flex';
    }

    function startGame() {
      resetGame();
      gameActive = true;
      startScreen.style.display = 'none';
      gameOverlay.style.display = 'none';
      frameCount = 0;
      if (gameLoopId) cancelAnimationFrame(gameLoopId);
      gameLoopId = requestAnimationFrame(gameTick);
    }

    // --- ПРИВЯЗКА СОБЫТИЙ ---
    window.addEventListener('keydown', handleKeyDown);
    window.addEventListener('keyup', handleKeyUp);
    canvas.addEventListener('mousemove', handleMouseMove);
    canvas.addEventListener('mousedown', handleMouseDown);
    canvas.addEventListener('mouseup', handleMouseUp);
    canvas.addEventListener('contextmenu', (e) => e.preventDefault());
    
    startBtn.addEventListener('click', startGame);
    restartBtn.addEventListener('click', startGame);
    
    // Начальная отрисовка
    resetGame();
    draw();
  })();
</script>
</body>
</html>
